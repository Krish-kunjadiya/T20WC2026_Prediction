services:
  postgres:
    image: postgres:15-alpine
    container_name: t20_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: t20_api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./models:/app/models
      - ./results:/app/results
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: t20_dashboard
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - ./models:/app/models
      - ./results:/app/results
      - ./data:/app/data
    depends_on:
      - api
      - postgres
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  chromadb:
    image: chromadb/chroma:latest
    container_name: t20_chromadb
    ports:
      - "8002:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  chroma_data:
